<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carnaval de Ubrique | Agrupaciones</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 28px 0 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 { font-size: 1.9rem; }

    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.96rem;
    }

    .nav-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: none;
      cursor: pointer;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #111827;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 24px;
    }

    input, select {
      background: #0b1220;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      padding: 10px 14px;
      outline: none;
      min-width: 160px;
      flex: 1;
    }

    .results-meta {
      color: var(--muted);
      margin-bottom: 16px;
      font-size: 0.94rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .card-cover {
      aspect-ratio: 16 / 10;
      background: #1f2937;
      overflow: hidden;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .year-badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(245, 158, 11, 0.12);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .name {
      font-size: 1.08rem;
      line-height: 1.3;
      color: var(--text);
      font-weight: 800;
    }

    .meta, .authors {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .links {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .link {
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .empty-state {
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .filters { flex-direction: column; }
      input, select { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Directorio de agrupaciones</h1>
        <p class="subtitle">Consulta agrupaciones del Carnaval de Ubrique por año, nombre y tipo.</p>
      </div>
      <div class="nav-actions">
        <a class="btn btn-secondary" href="index.html">Inicio</a>
        <a class="btn btn-primary" href="admin.html">Administración</a>
      </div>
    </header>

    <section class="filters">
      <input type="text" id="searchName" placeholder="🔎 Buscar por nombre..." />
      <select id="filterYear">
        <option value="all">Todos los años</option>
      </select>
      <select id="filterType">
        <option value="all">Todos los tipos</option>
      </select>
      <button class="btn btn-secondary" type="button" onclick="clearFilters()">Limpiar filtros</button>
    </section>

    <p class="results-meta" id="resultsMeta">Cargando agrupaciones...</p>
    <main class="grid" id="groupGrid"></main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Sustituye estos valores por los de tu proyecto de Firebase
const firebaseConfig = {
    apiKey: "AIzaSyDPFnFqpioEnuo5-nSDsGqupsv-AFyiunU",
    authDomain: "carnavalubrique.firebaseapp.com",
    projectId: "carnavalubrique",
    storageBucket: "carnavalubrique.firebasestorage.app",
    messagingSenderId: "925068714888",
    appId: "1:925068714888:web:cc2f7f3ca165515907903d",
    measurementId: "G-LT0TP9BWSR"
  };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let groups = [];

    const nameInput = document.getElementById('searchName');
    const yearSelect = document.getElementById('filterYear');
    const typeSelect = document.getElementById('filterType');
    const grid = document.getElementById('groupGrid');
    const resultsMeta = document.getElementById('resultsMeta');

    nameInput.addEventListener('input', renderGroups);
    yearSelect.addEventListener('change', renderGroups);
    typeSelect.addEventListener('change', renderGroups);

    onSnapshot(collection(db, 'agrupaciones'), (snapshot) => {
      groups = [];
      snapshot.forEach((doc) => groups.push({ id: doc.id, ...doc.data() }));
      populateFilters();
      renderGroups();
    });

    function populateFilters() {
      const years = [...new Set(groups.map(g => String(g.year)).filter(Boolean))].sort((a, b) => Number(b) - Number(a));
      const types = [...new Set(groups.map(g => (g.type || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'es'));

      yearSelect.innerHTML = '<option value="all">Todos los años</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
      typeSelect.innerHTML = '<option value="all">Todos los tipos</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    function getFilteredGroups() {
      const text = nameInput.value.toLowerCase().trim();
      const year = yearSelect.value;
      const type = typeSelect.value;

      return groups.filter(group => {
        const matchesText = !text || (group.name && group.name.toLowerCase().includes(text));
        const matchesYear = year === 'all' || String(group.year) === year;
        const matchesType = type === 'all' || (group.type || '') === type;
        return matchesText && matchesYear && matchesType;
      }).sort((a, b) => {
        if (String(b.year) !== String(a.year)) return Number(b.year || 0) - Number(a.year || 0);
        return (a.name || '').localeCompare((b.name || ''), 'es');
      });
    }

    window.clearFilters = function() {
      nameInput.value = '';
      yearSelect.value = 'all';
      typeSelect.value = 'all';
      renderGroups();
    }

    function renderGroups() {
      const filtered = getFilteredGroups();
      resultsMeta.textContent = `${filtered.length} agrupación(es) encontradas`;

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state">No hay agrupaciones que coincidan con los filtros actuales.</div>';
        return;
      }

      grid.innerHTML = filtered.map(group => `
        <article class="card">
          <div class="card-cover">
            <img src="${group.image || 'https://placehold.co/800x500?text=Carnaval+de+Ubrique'}" alt="Imagen de ${group.name || 'agrupación'}" onerror="this.src='https://placehold.co/800x500?text=Sin+imagen'">
          </div>
          <div class="card-body">
            <span class="year-badge">${group.year || 'Sin año'}</span>
            <h2 class="name">${group.name || 'Sin nombre'}</h2>
            <span class="pill">${group.type || 'Sin tipo'}</span>
            <p class="authors"><strong>Autores:</strong> ${group.authors || 'Pendiente de completar'}</p>
            <p class="meta">${group.notes || ''}</p>
            <div class="links">
              ${group.youtube ? `<a class="link" target="_blank" rel="noopener noreferrer" href="${group.youtube}">YouTube</a>` : ''}
              ${group.sourceUrl ? `<a class="link" target="_blank" rel="noopener noreferrer" href="${group.sourceUrl}">Fuente</a>` : ''}
            </div>
          </div>
        </article>
      `).join('');
    }
  </script>
</body>
</html>
